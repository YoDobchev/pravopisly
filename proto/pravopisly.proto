syntax = "proto3";

package pravopisly;

option go_package = "github.com/YoDobchev/pravopisly/be/pb";

service PravopislyComms {
	rpc SendText(SendToModel) returns (ModelReply) {}
}

message SendToModel {
	string text = 1;
}

message ModelReply {
	repeated TextSuggestion suggestions = 1;
}

message TextSuggestion {
	SuggestionType type = 1;

	int32 start_index = 2;
	int32 end_index = 3;

	repeated string replacements = 4;
}

enum SuggestionType {
	UNKNOWN = 0;
	COMMA = 1;
	GRAMMAR = 2;
	SPELLING = 3;
}